<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Stipend.io — Documenti Legali</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #0f172a; color: #e2e8f0; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
    .container { text-align: center; padding: 40px 24px; }
    .logo { font-size: 48px; margin-bottom: 16px; }
    h1 { font-size: 32px; font-weight: 700; color: #60a5fa; margin-bottom: 8px; }
    p { color: #94a3b8; margin-bottom: 40px; }
    .links { display: flex; flex-direction: column; gap: 16px; max-width: 300px; margin: 0 auto; }
    a { display: block; background: linear-gradient(135deg, #1e3a5f, #1e293b); border: 1px solid #2563eb; border-radius: 16px; padding: 20px 24px; color: #60a5fa; text-decoration: none; font-weight: 600; font-size: 18px; transition: all 0.2s; }
    a:hover { background: linear-gradient(135deg, #2563eb20, #1e3a5f); transform: translateY(-2px); }
    .emoji { font-size: 24px; display: block; margin-bottom: 8px; }
  </style>
</head>
<body>
  <div class="container">
    <div class="logo">💰</div>
    <h1>Stipend.io</h1>
    <p>Documenti legali e informativi</p>
    <div class="links">
      <a href="privacy.html">
        <span class="emoji">🔒</span>
        Privacy Policy
      </a>
      <a href="terms.html">
        <span class="emoji">📄</span>
        Termini di Servizio
      </a>
    </div>
  </div>
</body>
</html>
